backend:
  image:
    repository: kushal81/ticketing-backend
    tag: latest
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  hpa:
    minReplicas: 2
    maxReplicas: 5
    cpuUtilization: 70

frontend:
  image:
    repository: kushal81/ticketing-frontend
    tag: latest
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

postgres:
  image: postgres:16-alpine
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  image: redis:7-alpine
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  host: ticketing.local

config:
  jwtAlgorithm: HS256
  accessTokenExpireMinutes: "480"
  corsOrigins: '["http://localhost:3000"]'
  defaultAdminEmail: admin@company.local
  defaultAdminPassword: ChangeMe123!
  defaultAdminName: Default Admin
  postgresDb: helpdesk
  postgresUser: helpdesk

secrets:
  dbPassword: helpdesk_password
  jwtSecret: replace-this-with-a-real-secret
